<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Developer Authorizer</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main>
      <section class="form login-form">
        <header>
          <h1>Developer Authorizer</h1>
          <p>Enter password to continue.</p>
        </header>
        <label>Password</label>
        <input id="password" type="password" spellcheck="false" autocomplete="off" autofocus>
        <div class="actions">
          <button id="unlock">Unlock</button>
        </div>
        <p id="unlock-message"></p>
      </section>
    </main>
    <script src="login.js"></script>
  </body>
</html>
