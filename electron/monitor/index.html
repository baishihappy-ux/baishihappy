<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runtime Board</title>
    <link rel="stylesheet" href="./monitor.css" />
  </head>
  <body>
    <main class="monitor-shell">
      <header class="monitor-header">
        <div>
          <strong>Runtime Board</strong>
          <span id="monitorRoot">Current instance</span>
        </div>
        <small id="monitorUpdated">Waiting</small>
      </header>
      <section class="monitor-board" aria-live="polite">
        <div class="metric-card metric-primary"><span>Request rate</span><strong id="metricRequestRate">0/min</strong></div>
        <div class="metric-card metric-primary"><span>Save rate</span><strong id="metricSaveRate">0/min</strong></div>
        <div class="metric-card metric-success"><span>Success ratio</span><strong id="metricAccessSuccessRate">--</strong></div>
        <div class="metric-card metric-risk"><span>502 ratio</span><strong id="metric502Rate">0%</strong></div>
        <div class="metric-card"><span>In-flight</span><strong id="metricDoInflight">0/0</strong></div>
        <div class="metric-card"><span>Remaining</span><strong id="metricRemaining">0</strong></div>
        <div class="metric-card"><span>Saved</span><strong id="metricSavedTotal">0</strong></div>
        <div class="metric-card"><span>Completed</span><strong id="metricCompletedTotal">0</strong></div>
        <div class="metric-card metric-state"><span>Status</span><strong id="metricRuntimeState">Idle</strong></div>
        <div class="metric-card metric-timer"><span>Elapsed</span><strong id="runtimeTimer">00:00:00</strong></div>
      </section>
    </main>
    <script src="./monitor.js"></script>
  </body>
</html>
